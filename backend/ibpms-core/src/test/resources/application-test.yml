spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  rabbitmq:
    host: localhost
    port: 5672
  data:
    redis:
      host: localhost
      port: 6379

# Disable context-path for integration tests (tests use full paths)
server:
  servlet:
    context-path: ""

# Disable Camunda auto-deploy in tests
camunda:
  bpm:
    deployment-resource-pattern: ""
    job-execution:
      enabled: false
    database:
      schema-update: false

# Security: use a static JWT secret for tests
ibpms:
  security:
    jwt:
      secret: UAT_SUPER_SECRET_KEY_THAT_IS_VERY_LONG_AND_SECURE_982374982374892374
