spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  application:
    name: ibpms-core
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ibpms_db}
    username: ${POSTGRES_USER:ibpms_user}
    password: ${POSTGRES_PASSWORD:ibpms_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Auto-reparación por Hibernate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

camunda:
  bpm:
    client:
      base-url: http://localhost:8080/api/v1/engine-rest
    database:
      type: postgres
    deployment-resource-pattern: classpath:/processes/*.bpmn
    job-execution:
      enabled: true
    history-level: full

app:
  storage:
    path: ./uploads
  azure:
    storage:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;}
      container-name: ${AZURE_STORAGE_CONTAINER:ibpms-docs}

jwt:
  secret: ${JWT_SECRET:changeme-this-must-be-at-least-32-chars-for-hs256-signature!!}
  expiration: 3600

server:
  port: 8080
  servlet:
    context-path: /api/v1
  tomcat:
    max-http-form-post-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

resilience4j.circuitbreaker:
  instances:
    crmService:
      registerHealthIndicator: true
      slidingWindowSize: 10              # Evalúa fallos en las últimas 10 llamadas
      minimumNumberOfCalls: 5            # Espera 5 llamadas antes de calcular el ratio de error
      permittedNumberOfCallsInHalfOpenState: 3
      automaticTransitionFromOpenToHalfOpenEnabled: true
      waitDurationInOpenState: 15s       # En caso de falla, asume apertura de 15 segundos
      failureRateThreshold: 50           # Activa modo degradado si fallan el 50% de las llamadas
