name: iBPMS CI/CD Pipeline (Azure Azure Web Apps / AKS)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: ibpms-core
  FRONTEND_IMAGE_NAME: ibpms-frontend
  # Epic 13: Identity and Key Vault Access (DevOps)
  AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
  MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}

jobs:
  # 1. QUALITY GATE: Backend Build & Test
  backend-quality-gate:
    name: Backend Build & Maven Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/ibpms-core
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile and Test (Quality Gate)
        run: mvn clean verify -DskipTests=false
        # El comando incluye pruebas unitarias y de integración de la plataforma Spring Boot
        # Finaliza con status 1 si hay fallos o vulnerabilidades rompiendo el Pipeline

  # 2. QUALITY GATE: Frontend Build & Test
  frontend-quality-gate:
    name: Frontend Vite Build & Crash Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Linter & Static Analysis
        run: npm run lint --if-present

      - name: Execute Vitest Crash Tests (Zero Exit Code required)
        run: npm run test -- --run
        # El pipeline fallará si las 29 pruebas no pasan al 100%

      - name: Build Production Asset
        run: npm run build

  # 3. BUILD & PUSH: Azure Container Registry
  docker-build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [backend-quality-gate, frontend-quality-gate]
    if: github.ref == 'refs/heads/main'
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }} # e.g. ibpmsregistry.azurecr.io
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} ./backend/ibpms-core
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build Frontend Docker Image
        # Asumiendo la adición futura de un Dockerfile / Nginx en el Frontend
        # docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} ./frontend
        # docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
        run: echo "Nginx Frontend Docker strategy would run here."

  # 4. DEPLOY (CD): Azure Environment
  azure-deploy:
    name: CD Deploy to Azure QA/PROD
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App for Containers (Simulated)
        run: |
          echo "Simulated deployment to Azure via az webapp config container set..."
          echo "az webapp config container set --name ibpms-backend-prod --resource-group ibpms-rg --docker-custom-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} --docker-registry-server-url https://${{ env.ACR_LOGIN_SERVER }} --docker-registry-server-user ${{ env.ACR_USERNAME }} --docker-registry-server-password ${{ env.ACR_PASSWORD }}"
